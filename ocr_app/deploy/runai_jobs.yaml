# ============================================================================
# RunAI Job Definitions for Document Extraction System
#
# Architecture:
#   ┌─────────────────────┐     ┌───────────────────────────────┐
#   │   ocr-setup         │     │   qwen3--vl--32b--instruct-awq│
#   │   Workspace (CPU)   │────▶│   vLLM Inference (GPU)        │
#   │   Jupyter notebook  │     │   Qwen3-VL-32B-Instruct-AWQ   │
#   └─────────────────────┘     └───────────────────────────────┘
#
# Pipeline: chunk-based, two-pass notebook pipeline (only documented and
# tested path). Every page is rendered as an image and sent to the VLM
# for structured extraction; chunks are merged programmatically with
# continuation-flag stitching, then a Pass-2 doc-level synthesis runs.
# ============================================================================

# ---------------------------------------------------------------------------
# Job 1: vLLM Server (Inference workload, GPU)
# ---------------------------------------------------------------------------
# Serves Qwen3-VL-32B-Instruct-AWQ (~20 GB, AWQ 4-bit) for the notebook.
# A vision model so it can handle scanned pages too.
#
# RunAI UI settings:
#   Inference type:  Custom
#   Name:            qwen3--vl--32b--instruct-awq
#   Image:           vllm/vllm-openai:latest
#   Container port:  8000
#   Command:         (leave empty — image default)
#   Arguments:       QuantTrio/Qwen3-VL-32B-Instruct-AWQ --quantization awq_marlin --dtype half --max-model-len 16384
#   Env:             HF_HOME=/models/.cache/huggingface
#                    HF_HUB_CACHE=/models/.cache/huggingface
#                    HF_HUB_OFFLINE=1
#   GPU fraction:    75% (96 GB GPU; AWQ weights ~20 GB + KV cache ~8 GB + overhead)
#   Data volume:     shared-models -> /models
#
# Pre-requisite: model present on the shared PVC. See
# rag_app/docs/setup-shared-models.md for the provisioning workflow.
